<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive System</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; 
            -webkit-font-smoothing: antialiased; 
            overflow: hidden;
        }
        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 420px; 
            animation: appleEntrance 1.2s cubic-bezier(0.15, 0.8, 0.2, 1); 
        }
        .spinner { 
            width: 32px; height: 32px; 
            border: 1.5px solid rgba(255,255,255,0.1); 
            border-top: 1.5px solid #fff; 
            border-radius: 50%; 
            margin: 0 auto 30px; 
            animation: spin 0.8s linear infinite; 
        }
        h1 { 
            font-size: 26px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            letter-spacing: -0.02em; 
            color: #ffffff;
        }
        p { 
            font-size: 16px; 
            color: #86868b; 
            margin-bottom: 45px; 
            letter-spacing: -0.01em;
        }
        .btn { 
            display: block; 
            background: #1c1c1e; 
            color: #fff; 
            padding: 22px; 
            margin-bottom: 16px; 
            border-radius: 18px; 
            text-decoration: none; 
            font-size: 18px; 
            font-weight: 500; 
            transition: all 0.3s ease; 
            border: 1px solid #3a3a3c; 
        }
        .btn:hover { 
            background: #ffffff; 
            color: #000000; 
            transform: scale(1.02); 
            border-color: #ffffff;
        }
        .btn span { 
            display: block; 
            font-size: 12px; 
            opacity: 0.6; 
            margin-top: 5px; 
            font-weight: 400; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        @keyframes appleEntrance { 
            0% { opacity: 0; transform: translateY(20px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>正在開啟雲端硬碟</h1>
        <p>請稍候，系統正在為您建立安全連接</p>
        
        <!-- 按鈕 A：Dropbox 下載連結 -->
        <a href="https://www.dropbox.com/scl/fo/pbt0tvts5gkpt6hm7jo2e/ADaydNfMQymJSZYqgAyPtFM?rlkey=83ia0h27le8qptftt5uqbmu5a&st=5cobv818&dl=0" class="btn">
            存取檔案庫
            <span>免登入下載</span>
        </a>

        <!-- 按鈕 B：Dropbox 要求檔案連結 (上傳) -->
        <a href="https://www.dropbox.com/request/HrCK0EOCCJidkjCsy6pI" class="btn">
            上傳新報告
            <span>免登入直接傳檔案</span>
        </a>
    </div>
</body>
</html>
